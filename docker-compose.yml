# LogPose — full self-hosted stack.
# Copy .env.example to .env and adjust before `docker compose up --build`.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: logpose
      POSTGRES_PASSWORD: logpose
      POSTGRES_DB: logpose
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No published port: app/worker reach Postgres over the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logpose"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No published port: app/worker reach Redis over the internal network.
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000" # S3 API (browser fetches presigned URLs here, via nginx)
      - "127.0.0.1:9010:9001" # web console — localhost-only, remapped off 9001
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket and make it readable for presigned GETs.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-music};
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logpose:logpose@postgres:5432/logpose?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-music}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      APP_PASSWORD: ${APP_PASSWORD:-change-me}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-this-to-a-long-random-secret}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-LogPose/0.1 (personal-music-app)}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-LogPose}
    ports:
      # Localhost-only: nginx on the host proxies HTTPS traffic to this port.
      - "127.0.0.1:3010:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logpose:logpose@postgres:5432/logpose?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-music}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      # Worker doesn't serve requests but env validation needs these present.
      APP_PASSWORD: ${APP_PASSWORD:-change-me}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-this-to-a-long-random-secret}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-LogPose/0.1 (personal-music-app)}

volumes:
  pgdata:
  redisdata:
  miniodata:
