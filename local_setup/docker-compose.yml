# LogPose — LOCAL DEV infrastructure only (no app/worker containers).
#
# Use this to run the backing services while you develop with `npm run dev`
# and `npm run worker:dev` on your host machine.
#
#   cd local_setup
#   docker compose up -d
#   cd ..
#   npm run db:migrate      # first time only
#   npm run dev             # in one terminal
#   npm run worker:dev      # in another terminal (for uploads / youtube)
#
# All ports are bound to 127.0.0.1 so nothing is exposed to your network.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: logpose
      POSTGRES_PASSWORD: logpose
      POSTGRES_DB: logpose
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logpose"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Host 6385 -> container 6379 (avoids clashes with other local redis).
      - "127.0.0.1:6385:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # web console (http://localhost:9001)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the "music" bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/music;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
